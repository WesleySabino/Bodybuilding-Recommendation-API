services:
  - type: web
    name: bodybuilding-recommendation-api
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    healthCheckPath: /api/v1/health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: bodybuilding-recommendation-db
          property: connectionString
      - key: JWT_SECRET_KEY
        sync: false
        value: REPLACE_WITH_STRONG_SECRET
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: PASSWORD_HASH_ALGORITHM
        value: argon2id

databases:
  - name: bodybuilding-recommendation-db
    databaseName: bodybuilding_api
    user: bodybuilding_api_user
    plan: basic-1gb
